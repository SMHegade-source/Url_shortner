<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <header>
                <h1>URL Shortener</h1>
                <p>Simplify your links in a single click.</p>
            </header>
            
            <form id="shorten-form">
                <div class="input-group">
                    <input type="url" id="url-input" placeholder="Enter your long URL here..." required>
                    <button type="submit" id="submit-btn">Shorten</button>
                </div>
            </form>

            <div id="result-container" class="hidden">
                <p>Your short URL is ready:</p>
                <div class="result-box">
                    <a id="short-url" href="#" target="_blank"></a>
                    <button id="copy-btn" title="Copy to clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
            
            <div id="error-message" class="hidden"></div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
